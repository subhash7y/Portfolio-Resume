<section id="contact" class="section-pad contact-section" aria-labelledby="contact-title">

        </div>
        <div class="contact-grid">
            <div class="contact-info" id="contactInfo">
                <div class="contact-item">

                <div class="contact-item">
                    <span class="contact-icon">📱</span>
                    <div>

                        <a href="tel:+919310981775">+91 93109 81775</a>
                    </div>
                </div>
                <div class="contact-item">
                    <span class="contact-icon">📍</span>
                    <div>
                        <strong>Location</strong>
                        <span>New Delhi, India</span>
                    </div>
                </div>
                <div class="contact-item">
                    <span class="contact-icon">💼</span>
                    <div>
                        <strong>LinkedIn</strong>
                        <a href="https://linkedin.com/in/subhash-kumar" target="_blank" rel="noopener noreferrer">linkedin.com/in/subhash-kumar</a>
                    </div>
                </div>

                    </div>

            <form class="contact-form" id="contactForm" action="#" method="POST" netlify>
                <div class="form-group">
                    <label for="contactName">Your Name</label>
                    <input type="text" id="contactName" name="name" placeholder="John Doe" required />
                </div>
                <div class="form-group">
                    <label for="contactEmail">Email Address</label>
                    <input type="email" id="contactEmail" name="email" placeholder="john@example.com" required />
                </div>
                <div class="form-group">
                    <label for="contactSubject">Subject</label>
                    <input type="text" id="contactSubject" name="subject" placeholder="Research collaboration" />
                </div>
                <div class="form-group">
                    <label for="contactMessage">Message</label>
                    <textarea id="contactMessage" name="message" rows="5" placeholder="Tell me about your idea..." required></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Send Message</button>
            </form>
        </div>
    </div>
                      </section>
